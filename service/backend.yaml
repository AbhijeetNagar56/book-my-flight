apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmf-backend-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bmf-backend
  template:
    metadata:
      labels:
        app: bmf-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/abhijeetnagar56/bmf-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: MONGO_URI
              value: ""
            - name: JWT_SECRET
              value: "abc123$%I"
            - name: FRONTEND_URL
              value: "http://bmf-frontend-service:8080"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: bmf-backend-service
spec:
  selector:
    app: bmf-backend
  ports:
    - port: 5000
      targetPort: 5000
  clusterIP: None
