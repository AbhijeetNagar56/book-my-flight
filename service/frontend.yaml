apiVersion: apps/v1
kind: Deployment
metadata:
  name: bmf-frontend-deployment
spec:
  replicas: 3
  selector:
    matchLabels:
      app: bmf-frontend
  template:
    metadata:
      labels:
        app: bmf-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/abhijeetnagar56/bmf-frontend:latest
          ports:
            - containerPort: 80
          env:
            - name: VITE_API_BASE_URL
              value: "http://bmf-backend-service:5000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: bmf-frontend-service
spec:
  type: LoadBalancer
  selector:
    app: bmf-frontend
  ports:
    - port: 8080
      targetPort: 80
